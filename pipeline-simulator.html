// ─── PIPELINE ───────────────────────────────────────────────────────

function runPipeline(tickets) {
  const findings = [];
  tickets.filter(t => t.status === "Resolved").forEach(t => {
    if (!t.pipelineResult) return;
    findings.push({ ...t.pipelineResult, ticketId: t.id, agent: t.agent, kbRef: t.kbRef });
  });

  const groups = {};
  findings.forEach(f => {
    const noKbTypes = ["no_article", "action_required"];
    const key = noKbTypes.includes(f.type)
      ? `${f.type}:${f.subject || f.topic}`
      : `${f.type}:${f.kbRef || "none"}:${f.subject || f.topic}`;
    if (!groups[key]) groups[key] = { type: f.type, subject: f.subject || f.topic, kbRef: f.kbRef, findings: [] };
    groups[key].findings.push(f);
  });

  const outputs = [];
  Object.values(groups).forEach(g => {
    if (g.type === "outdated") {
      const answers = [...new Set(g.findings.map(f => f.resolutionSays))];
      if (answers.length > 1)         outputs.push({ ...g, outputType: "conflict",           answers, priority: 0 });
      else if (g.findings.length >= 2) outputs.push({ ...g, outputType: "correction_draft",          priority: 1 });
      else                             outputs.push({ ...g, outputType: "correction_finding",         priority: 5 });
    } else if (g.type === "incomplete") {
      outputs.push({ ...g, outputType: g.findings.length >= 2 ? "addition_draft" : "addition_finding", priority: g.findings.length >= 2 ? 1 : 5 });
    } else if (g.type === "no_article") {
      outputs.push({ ...g, outputType: g.findings.length >= 2 ? "creation_draft" : "creation_finding", priority: g.findings.length >= 2 ? 2 : 5 });
    } else if (g.type === "too_complex") {
      outputs.push({ ...g, outputType: "simplification", priority: 3 });
    } else if (g.type === "action_required") {
      outputs.push({ ...g, outputType: "routing",        priority: 2 });
    } else if (g.type === "search_failure") {
      outputs.push({ ...g, outputType: "retrieval_flag", priority: 4 });
    }
  });

  return {
    findings,
    outputs: outputs.sort((a, b) => a.priority - b.priority),
    stale: tickets.filter(t => t.status === "Open"),
    echoTicket: tickets.find(t => t.id === "WI-1220"),
  };
}

function Msg({ m }) {
  const isAgent = m.from === "agent"; const isAI = m.from === "ai";
  const bg = isAI ? C.purpleBg : isAgent ? C.tealBg : C.grayBg;
  const nc = isAI ? C.purple   : isAgent ? C.teal   : C.gray;
  return (
    <div style={{ padding: 10, marginTop: 6, borderRadius: 8, background: bg }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: nc }}>{m.name}</span>
        <span style={{ fontSize: 10, color: C.mu }}>{m.time}</span>
        {isAI && <span style={B(C.purple)}>AI</span>}
      </div>
      <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.6 }}>{m.text}</div>
    </div>
  );
}

  const classColor = t.pipelineResult ? (CLASS_COLOR[t.pipelineResult.type] || C.gray) : null;

  return (
    <div style={{ border: `1px solid ${isEcho ? C.amber + "60" : C.bdr}`, borderRadius: 8, marginBottom: 8, background: C.card }}>
      <div onClick={() => setOpen(!open)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, color: C.mu, minWidth: 56 }}>{t.id}</span>
        <span style={{ fontSize: 13, color: C.tx, flex: 1, fontWeight: 500, minWidth: 180 }}>{t.title}</span>
        {ag && <div style={AV(ag)}>{ag.initials}</div>}
        <span style={B(t.status === "Resolved" ? C.green : t.status === "Open" ? C.red : C.amber)}>{t.status}</span>
        {t.resolutionType && <span style={B(t.resolutionType === "action" ? C.purple : C.teal)}>{t.resolutionType}</span>}
        {t.kbRef ? <span style={B(C.blue)}>{t.kbRef}</span> : t.status === "Resolved" ? <span style={B(C.purple)}>No KB</span> : null}
        {t.pipelineResult
          ? <span style={B(classColor)}>{t.pipelineResult.type.replace("_", " ")}</span>
          : t.status === "Resolved" && t.kbRef
            ? <span style={B(isEcho ? C.amber : C.gray)}>{isEcho ? "echo" : "no delta"}</span>
            : null}
        <span style={{ fontSize: 14, color: C.mu, transform: open ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>&#x25BE;</span>
      </div>
      {open && (
        <div style={{ padding: "0 14px 14px", borderTop: `1px solid ${C.bdr}` }}>
          <div style={{ display: "flex", gap: 12, padding: "8px 0", fontSize: 11, color: C.mu, flexWrap: "wrap" }}>
            <span>Topic: {t.topic}</span><span>Created: {t.created}</span>
            {ag  && <span>Agent: {ag.name}</span>}
            {art && <span style={{ color: C.blue }}>KB: {art.title}</span>}
          </div>
          {t.messages.map((m, i) => <Msg key={i} m={m} />)}
          {t.agentNotes && (
            <div style={{ padding: 10, marginTop: 6, borderLeft: `3px solid ${C.amber}`, background: C.amberBg }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: C.amber, marginBottom: 4 }}>AGENT INTERNAL NOTE</div>
              <div style={{ fontSize: 12, color: C.sub, lineHeight: 1.5 }}>{t.agentNotes}</div>
            </div>
          )}
          {isEcho && (
            <div style={{ padding: 10, marginTop: 6, background: C.redBg, borderLeft: `3px solid ${C.red}` }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: C.red, marginBottom: 4 }}>ECHO PROBLEM</div>
              <div style={{ fontSize: 12, color: C.sub, lineHeight: 1.5 }}>Raj repeated the wrong $3,650 from the KB. The pipeline detects zero delta. This error is invisible. Only catchable via agent feedback channel or because other tickets (WI-1192, WI-1218) from Lisa independently contradicted the article.</div>
            </div>
          )}
          {!t.pipelineResult && t.status === "Resolved" && t.kbRef && !isEcho && (
            <div style={{ padding: 10, marginTop: 6, background: C.greenBg, borderLeft: `3px solid ${C.green}` }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: C.green }}>NO DELTA: article is correct, agent response consistent</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function ActionButtons({ primary, primaryLabel }) {
  return (
    <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
      <button style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: C.tx, color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{primaryLabel}</button>
      <button style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${C.bdr}`, background: C.card, color: C.sub, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Edit draft</button>
      <button style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${C.bdr}`, background: C.card, color: C.red,  fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Dismiss</button>
    </div>
  );
}

function Output({ o }) {
  const [open, setOpen] = useState(false);
  const art = KB_ARTICLES.find(a => a.id === o.kbRef);
  const c   = OUT_COLOR[o.outputType] || C.gray;
  const lbl = OUT_LABEL[o.outputType] || o.outputType;
  const isFlag = o.outputType === "retrieval_flag" || o.outputType === "simplification";

  return (
    <div style={{ border: `1px solid ${c}30`, borderLeft: `3px solid ${c}`, marginBottom: 8, background: C.card }}>
      <div onClick={() => setOpen(!open)} style={{ padding: "12px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <span style={B(c)}>{lbl}</span>
        <span style={{ fontSize: 13, fontWeight: 600, color: C.tx, flex: 1, minWidth: 150 }}>{o.subject}</span>
        <span style={{ fontSize: 12, color: C.mu }}>{o.findings.length} ticket{o.findings.length !== 1 ? "s" : ""}</span>
        {art && <span style={{ fontSize: 11, color: C.blue }}>{art.title}</span>}
        <span style={{ fontSize: 14, color: C.mu, transform: open ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>&#x25BE;</span>
      </div>
      {open && (
        <div style={{ padding: "0 14px 14px", borderTop: `1px solid ${C.bdr}` }}>

          {/* CONFLICT */}
          {o.outputType === "conflict" && (
            <div style={{ padding: 12, background: C.redBg, borderRadius: 8, marginTop: 8 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: C.red, marginBottom: 6 }}>Agents gave different answers:</div>
              {o.findings.map((f, i) => <div key={i} style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}><strong>{AGENTS[f.agent]?.name}</strong> ({f.ticketId}): {f.resolutionSays}</div>)}
              <div style={{ fontSize: 12, color: C.red, marginTop: 8, fontWeight: 600 }}>Cannot generate draft. Human verification needed before any update.</div>
            </div>
          )}

          {/* CORRECTION DRAFT (outdated article) */}
          {o.outputType === "correction_draft" && (
            <div style={{ display: "flex", gap: 10, marginTop: 8, marginBottom: 10 }}>
              <div style={{ flex: 1, padding: 10, borderRadius: 8, background: C.redBg }}><div style={{ fontSize: 10, fontWeight: 600, color: C.red, marginBottom: 4 }}>CURRENT (outdated)</div><div style={{ fontSize: 13, color: C.sub }}>{o.findings[0]?.articleSays}</div></div>
              <div style={{ flex: 1, padding: 10, borderRadius: 8, background: C.greenBg }}><div style={{ fontSize: 10, fontWeight: 600, color: C.green, marginBottom: 4 }}>PROPOSED</div><div style={{ fontSize: 13, color: C.sub }}>{o.findings[0]?.resolutionSays}</div></div>
            </div>
          )}

          {/* ADDITION DRAFT (incomplete article) */}
          {o.outputType === "addition_draft" && (
            <div style={{ padding: 10, borderRadius: 8, background: C.amberBg, margin: "8px 0 10px" }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: C.amber, marginBottom: 4 }}>ADD TO ARTICLE</div>
              <div style={{ fontSize: 13, color: C.sub }}>{o.findings[0]?.agentProvided}</div>
            </div>
          )}

          {/* NEW ARTICLE DRAFT (no article exists) */}
          {o.outputType === "creation_draft" && (
            <div style={{ padding: 10, borderRadius: 8, background: C.purpleBg, margin: "8px 0 10px" }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: C.purple, marginBottom: 4 }}>PROPOSED NEW ARTICLE</div>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.tx, marginBottom: 4 }}>{o.findings[0]?.topic}</div>
              <div style={{ fontSize: 12, color: C.sub, lineHeight: 1.6 }}>{o.findings[0]?.knowledge}</div>
            </div>
          )}

          {/* SIMPLIFICATION FLAG (too complex) */}
          {o.outputType === "simplification" && (
            <div style={{ marginTop: 8, marginBottom: 10 }}>
              <div style={{ padding: 10, borderRadius: 8, background: C.blueBg, marginBottom: 8 }}>
                <div style={{ fontSize: 10, fontWeight: 600, color: C.blue, marginBottom: 4 }}>AGENT'S REPHRASED VERSION</div>
                <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.6 }}>{o.findings[0]?.rephrasedVersion}</div>
              </div>
              <div style={{ fontSize: 12, color: C.mu, lineHeight: 1.6 }}>The article content is factually correct. The user couldn't follow it — agent rephrased it successfully. Storing the simpler version may improve future match rates and deflection. Gray area: could also mean the user wanted to be spoon-fed.</div>
            </div>
          )}

          {/* ROUTING ARTICLE (action required) */}
          {o.outputType === "routing" && (
            <div style={{ marginTop: 8, marginBottom: 10 }}>
              <div style={{ padding: 10, borderRadius: 8, background: C.grayBg, marginBottom: 8 }}>
                <div style={{ fontSize: 10, fontWeight: 600, color: C.gray, marginBottom: 4 }}>PROPOSED ROUTING ARTICLE</div>
                <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.6 }}>{o.findings[0]?.routingDraft}</div>
              </div>
              <div style={{ fontSize: 12, color: C.mu, lineHeight: 1.6 }}>This resolution required a human action, not knowledge. The useful article isn't a how-to — it's a routing article that sets expectations: "this needs a human agent, here's what to expect."</div>
            </div>
          )}

          {/* RETRIEVAL FLAG (search failure) */}
          {o.outputType === "retrieval_flag" && (
            <div style={{ padding: 10, borderRadius: 8, background: C.purpleBg, margin: "8px 0 10px" }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: C.purple, marginBottom: 4 }}>RETRIEVAL PROBLEM — NOT A CONTENT GAP</div>
              <div style={{ fontSize: 12, color: C.sub, marginBottom: 6, lineHeight: 1.6 }}>{o.findings[0]?.keywordNote}</div>
              <div style={{ fontSize: 11, color: C.purple }}>Existing article: {o.findings[0]?.existingArticle}. No KB update needed. Logged for retrieval/RAG review.</div>
            </div>
          )}

          {/* BELOW-THRESHOLD FINDINGS */}
          {(o.outputType === "correction_finding" || o.outputType === "addition_finding" || o.outputType === "creation_finding") && (
            <div style={{ padding: 10, borderRadius: 8, background: C.blueBg, margin: "8px 0 10px" }}>
              <div style={{ fontSize: 12, color: C.blue }}>Only {o.findings.length} ticket — below the 2-ticket threshold to generate a draft. Accumulating. Will escalate when a second ticket corroborates.</div>
            </div>
          )}

          {/* EVIDENCE */}
          <div style={{ fontSize: 11, fontWeight: 600, color: C.mu, marginBottom: 6, marginTop: 8 }}>SOURCE EVIDENCE</div>
          {o.findings.map((f, i) => (
            <div key={i} style={{ padding: 8, background: C.grayBg, borderRadius: 6, marginBottom: 4 }}>
              <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 2 }}>
                <span style={B(C.blue)}>{f.ticketId}</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: C.tx }}>{AGENTS[f.agent]?.name}</span>
                <span style={B(f.general ? C.green : C.gray)}>{f.general ? "General" : "Specific"}</span>
              </div>
              <div style={{ fontSize: 12, color: C.mu }}>{f.sourceMsg}</div>
            </div>
          ))}

          {/* ACTION BUTTONS */}
          {o.outputType === "correction_draft"  && <ActionButtons primaryLabel="Approve & publish" />}
          {o.outputType === "addition_draft"    && <ActionButtons primaryLabel="Approve & publish" />}
          {o.outputType === "creation_draft"    && <ActionButtons primaryLabel="Create article" />}
          {o.outputType === "routing"           && <ActionButtons primaryLabel="Create routing article" />}
          {o.outputType === "simplification"    && (
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: C.tx, color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Store rephrased version</button>
              <button style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${C.bdr}`, background: C.card, color: C.red, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Dismiss</button>
            </div>
          )}
          {o.outputType === "retrieval_flag" && (
            <div style={{ marginTop: 10 }}>
              <button style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${C.bdr}`, background: C.card, color: C.gray, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Log for retrieval review</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────

function App() {
  const [tab,    setTab]    = useState("pipeline");
  const [hasRun, setHasRun] = useState(false);
  const [running, setRunning] = useState(false);
  const [step,   setStep]   = useState(0);
  const [results, setResults] = useState(null);

  const run = () => {
    setRunning(true); setStep(1);
    const iv = setInterval(() => {
      setStep(s => {
        if (s >= 5) { clearInterval(iv); setRunning(false); setHasRun(true); setResults(runPipeline(TICKETS)); return 5; }
        return s + 1;
      });
    }, 700);
  };

  const resolved  = TICKETS.filter(t => t.status === "Resolved").length;
  const withDelta = TICKETS.filter(t => t.pipelineResult).length;

  return (
    <div style={{ fontFamily: "'Nunito Sans', system-ui, sans-serif", background: C.bg, minHeight: "100vh", padding: "20px 24px" }}>
      <div style={{ maxWidth: 960, margin: "0 auto" }}>

        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: C.mu, textTransform: "uppercase", letterSpacing: "0.04em" }}>Resolution drafts prototype</div>
          <h1 style={{ fontSize: 22, fontWeight: 700, color: C.tx, margin: "4px 0" }}>Retroactive KB analysis</h1>
          <div style={{ fontSize: 13, color: C.mu }}>{TICKETS.length} tickets · {resolved} resolved · 2 agents · {KB_ARTICLES.length} KB articles · 6 failure classifications</div>
        </div>

        <div style={{ display: "flex", gap: 4, marginBottom: 16, borderBottom: `1px solid ${C.bdr}`, paddingBottom: 4 }}>
          {[["pipeline","Pipeline"],["tickets",`Tickets (${TICKETS.length})`],["articles",`KB Articles (${KB_ARTICLES.length})`],["agents","Agents (2)"]].map(([id,l]) => (
            <button key={id} onClick={() => setTab(id)} style={{ padding: "8px 16px", borderRadius: "6px 6px 0 0", border: "none", background: tab===id?C.card:"transparent", borderBottom: tab===id?`2px solid ${C.tx}`:"2px solid transparent", color: tab===id?C.tx:C.mu, fontSize: 13, fontWeight: tab===id?600:400, cursor: "pointer", fontFamily: "inherit" }}>{l}</button>
          ))}
        </div>

        {tab === "pipeline" && (
          <div>
            {!hasRun && !running && (
              <div style={{ textAlign: "center", padding: 40 }}>
                <div style={{ fontSize: 15, color: C.sub, marginBottom: 16 }}>Analyze {resolved} resolved tickets to surface KB gaps, outdated content, and missing articles.</div>
                <button onClick={run} style={{ padding: "12px 32px", borderRadius: 8, border: "none", background: C.tx, color: "#fff", fontSize: 15, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Run analysis</button>
              </div>
            )}

            {(running || hasRun) && (
              <div style={{ marginBottom: 20 }}>
                {[
                  ["Collecting resolved tickets",            `${resolved} resolved by human agents`, C.gray],
                  ["Retrieving KB articles + resolution type", `${TICKETS.filter(t=>t.status==="Resolved"&&t.kbRef).length} with KB link · ${TICKETS.filter(t=>t.status==="Resolved"&&!t.kbRef&&t.pipelineResult).length} creation/action path`, C.purple],
                  ["Running LLM comparison + classification", `${withDelta} with findings · ${resolved - withDelta} no delta (1 is echo problem)`, C.teal],
                  ["Grouping findings + conflict detection",  "Checking agent agreement across tickets", C.amber],
                  ["Generating outputs",                      "Correction drafts, addition drafts, new articles, routing proposals, flags", C.green],
                ].map(([l, d, c], i) => (
                  <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 10, opacity: step > i ? 1 : step === i ? 0.6 : 0.25, transition: "opacity 0.4s" }}>
                    <div style={{ width: 22, height: 22, borderRadius: "50%", background: step>i?c+"20":C.grayBg, border: `1.5px solid ${step>i?c:C.bdr}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: step>i?c:C.mu, flexShrink: 0 }}>{step>i?"✓":i+1}</div>
                    <div><div style={{ fontSize: 14, fontWeight: 600, color: step>i?C.tx:C.mu }}>{l}</div><div style={{ fontSize: 12, color: C.mu }}>{d}</div></div>
                  </div>
                ))}
              </div>
            )}

            {hasRun && results && (
              <div>
                {/* Summary stats — 6 classifications */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 8, marginBottom: 16 }}>
                  {[
                    [results.outputs.filter(o=>o.outputType==="correction_draft").length,  "Correction drafts",  C.teal],
                    [results.outputs.filter(o=>o.outputType==="addition_draft").length,    "Addition drafts",    C.amber],
                    [results.outputs.filter(o=>o.outputType==="creation_draft").length,    "New article drafts", C.purple],
                    [results.outputs.filter(o=>o.outputType==="conflict").length,           "Conflict alerts",    C.red],
                    [results.outputs.filter(o=>o.outputType==="routing").length,            "Routing proposals",  C.gray],
                    [results.outputs.filter(o=>o.outputType==="simplification"||o.outputType==="retrieval_flag").length, "Flags", C.blue],
                  ].map(([n, l, c], i) => (
                    <div key={i} style={{ padding: "12px 8px", background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 8, textAlign: "center" }}>
                      <div style={{ fontSize: 24, fontWeight: 700, color: n > 0 ? c : C.mu }}>{n}</div>
                      <div style={{ fontSize: 10, color: C.mu, lineHeight: 1.3, marginTop: 2 }}>{l}</div>
                    </div>
                  ))}
                </div>

                {/* Echo blind spot callout */}
                <div style={{ padding: "10px 14px", background: C.amberBg, borderLeft: `3px solid ${C.amber}`, marginBottom: 14 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: C.amber, marginBottom: 2 }}>BLIND SPOT: ECHO PROBLEM</div>
                  <div style={{ fontSize: 12, color: C.sub, lineHeight: 1.6 }}>WI-1220: Raj Patel repeated wrong $3,650 from KB. Pipeline detected zero delta — this error is invisible. Only catchable because Lisa independently corrected it in WI-1192 and WI-1218, triggering the conflict detection path.</div>
                </div>

                <div style={{ fontSize: 14, fontWeight: 700, color: C.tx, marginBottom: 8 }}>Pipeline outputs</div>
                {results.outputs.map((o, i) => <Output key={i} o={o} />)}

                {results.stale.length > 0 && (
                  <div style={{ marginTop: 16 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.tx, marginBottom: 8 }}>Stale ticket alerts</div>
                    {results.stale.map(t => (
                      <div key={t.id} style={{ padding: 12, background: C.amberBg, borderLeft: `3px solid ${C.amber}`, marginBottom: 6 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={B(C.red)}>STALE</span><span style={{ fontSize: 13, fontWeight: 600, color: C.tx }}>{t.id}: {t.title}</span></div>
                        <div style={{ fontSize: 12, color: C.mu, marginTop: 4 }}>Open since {t.created}. No resolution. No KB article. Topic: {t.topic}.</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {tab === "tickets" && (
          <div>
            <div style={{ fontSize: 13, color: C.mu, marginBottom: 12 }}>Click any ticket to see the full conversation, AI attempt, agent resolution, and pipeline classification.</div>
            {TICKETS.map(t => <Ticket key={t.id} t={t} />)}
          </div>
        )}

        {tab === "articles" && (
          <div>
            {KB_ARTICLES.map(a => (
              <div key={a.id} style={{ border: `1px solid ${C.bdr}`, borderRadius: 8, padding: 16, marginBottom: 10, background: C.card }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
                  <span style={B(C.blue)}>{a.id}</span>
                  <span style={{ fontSize: 14, fontWeight: 600, color: C.tx, flex: 1 }}>{a.title}</span>
                  <span style={{ fontSize: 12, color: C.mu }}>{a.category}</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: a.deflection < 40 ? C.red : a.deflection < 70 ? C.amber : C.green }}>{a.deflection}%</span>
                </div>
                <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.6, padding: 12, background: C.grayBg, borderRadius: 6, marginBottom: 8 }}>{a.content}</div>
                <div style={{ display: "flex", gap: 16, fontSize: 12, color: C.mu }}><span>Updated: {a.updated}</span><span>Views: {a.views}/mo</span></div>
                {(a.issues.wrong || a.issues.missing) && (
                  <div style={{ marginTop: 8, padding: 10, background: C.redBg, borderRadius: 6 }}>
                    <div style={{ fontSize: 10, fontWeight: 600, color: C.red, marginBottom: 4 }}>KNOWN ISSUES</div>
                    {a.issues.wrong   && <div style={{ fontSize: 12, color: C.sub }}>Wrong: {a.issues.wrong}</div>}
                    {a.issues.missing && <div style={{ fontSize: 12, color: C.sub }}>Missing: {a.issues.missing}</div>}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {tab === "agents" && (
          <div style={{ display: "flex", gap: 16 }}>
            {Object.values(AGENTS).map(a => {
              const at   = TICKETS.filter(t => t.agent === a.id);
              const wf   = at.filter(t => t.pipelineResult);
              const echo = at.filter(t => t.status === "Resolved" && !t.pipelineResult && t.kbRef);
              return (
                <div key={a.id} style={{ flex: 1, border: `1px solid ${C.bdr}`, borderRadius: 8, padding: 20, background: C.card }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                    <div style={{ ...AV(a), width: 40, height: 40, fontSize: 14 }}>{a.initials}</div>
                    <div><div style={{ fontSize: 15, fontWeight: 700, color: C.tx }}>{a.name}</div><div style={{ fontSize: 12, color: C.mu }}>{a.role}</div></div>
                  </div>
                  <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.6, marginBottom: 12, padding: 10, background: C.grayBg, borderRadius: 6 }}>{a.behavior}</div>
                  <div style={{ fontSize: 12, color: C.mu, lineHeight: 1.8 }}>
                    <div><strong style={{ color: C.tx }}>{at.length}</strong> tickets handled</div>
                    <div><strong style={{ color: C.teal }}>{wf.length}</strong> produced findings</div>
                    <div><strong style={{ color: echo.length > 0 ? C.amber : C.green }}>{echo.length}</strong> no delta {echo.length > 0 ? "(includes echo risk)" : "(correct articles)"}</div>
                  </div>
                  {echo.length > 0 && (
                    <div style={{ marginTop: 8, padding: 8, background: C.amberBg, borderRadius: 6, fontSize: 12, color: C.amber }}>
                      {echo.map(t => t.id).join(", ")} — response matched KB. If KB was wrong, agent echoed the error.
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
