// ─── PIPELINE ───────────────────────────────────────────────────────

function runPipeline(tickets) {
  const findings = [];
  const skipped = [];
  tickets.filter(t => t.status === "Resolved").forEach(t => {
    if (!t.pipelineResult) {
      if (t.kbRef) skipped.push({ ticket: t.id, reason: t.id === "WI-1220" ? "ECHO: Agent repeated wrong KB info — zero delta" : "No delta — response consistent with article", echo: t.id === "WI-1220" });
      return;
    }
    findings.push({ ...t.pipelineResult, ticketId: t.id, agent: t.agent, kbRef: t.kbRef });
  });
  const groups = {};
  findings.forEach(f => {
    const key = f.type === "creation" ? `creation:${f.topic}` : `${f.type}:${f.kbRef}:${f.subject || f.topic}`;
    if (!groups[key]) groups[key] = { type: f.type, subject: f.subject || f.topic, kbRef: f.kbRef, findings: [] };
    groups[key].findings.push(f);
  });
  const outputs = [];
  Object.values(groups).forEach(g => {
    if (g.type === "wrong") {
      const answers = [...new Set(g.findings.map(f => f.resolutionSays))];
      if (answers.length > 1) outputs.push({ ...g, outputType: "conflict", answers, priority: 0 });
      else if (g.findings.length >= 2) outputs.push({ ...g, outputType: "draft", priority: 1 });
      else outputs.push({ ...g, outputType: "finding", priority: 3 });
    } else if (g.type === "missing") {
      outputs.push({ ...g, outputType: g.findings.length >= 2 ? "draft" : "finding", priority: g.findings.length >= 2 ? 1 : 3 });
    } else if (g.type === "creation") {
      outputs.push({ ...g, outputType: g.findings.length >= 2 ? "creation_draft" : "creation_finding", priority: g.findings.length >= 2 ? 2 : 3 });
    }
  });
  return { findings, skipped, outputs: outputs.sort((a,b) => a.priority - b.priority), stale: tickets.filter(t => t.status === "Open") };
}

        <span style={{ fontSize: 12, fontWeight: 600, color: nc }}>{m.name}</span>
        <span style={{ fontSize: 10, color: C.mu }}>{m.time}</span>
        {isAI && <span style={B(C.purple)}>AI</span>}
      </div>
      <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.6 }}>{m.text}</div>
    </div>
  );
}

          )}
          {o.outputType === "draft" && o.type === "missing" && (
            <div style={{ padding: 10, borderRadius: 8, background: C.amberBg, margin: "8px 0 10px" }}><div style={{ fontSize: 10, fontWeight: 600, color: C.amber, marginBottom: 4 }}>ADD TO ARTICLE</div><div style={{ fontSize: 13, color: C.sub }}>{o.findings[0]?.agentProvided}</div></div>
          )}
          {o.outputType === "creation_draft" && (
            <div style={{ padding: 10, borderRadius: 8, background: C.purpleBg, margin: "8px 0 10px" }}><div style={{ fontSize: 10, fontWeight: 600, color: C.purple, marginBottom: 4 }}>PROPOSED NEW ARTICLE</div><div style={{ fontSize: 13, fontWeight: 600, color: C.tx, marginBottom: 4 }}>How to set up 2FA for GitHub Enterprise</div><div style={{ fontSize: 12, color: C.sub, lineHeight: 1.6 }}>{o.findings[0]?.knowledge}</div></div>
          )}
          <div style={{ fontSize: 11, fontWeight: 600, color: C.mu, marginBottom: 6, marginTop: 8 }}>SOURCE EVIDENCE</div>
          {o.findings.map((f, i) => (
            <div key={i} style={{ padding: 8, background: C.grayBg, borderRadius: 6, marginBottom: 4 }}>
              <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 2 }}>
                <span style={B(C.blue)}>{f.ticketId}</span><span style={{ fontSize: 12, fontWeight: 600, color: C.tx }}>{AGENTS[f.agent]?.name}</span><span style={B(f.general ? C.green : C.gray)}>{f.general ? "General" : "Specific"}</span>
              </div>
              <div style={{ fontSize: 12, color: C.mu }}>{f.sourceMsg}</div>
            </div>
          ))}
          {(o.outputType === "draft" || o.outputType === "creation_draft") && (
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: C.tx, color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{o.outputType === "creation_draft" ? "Create article" : "Approve & publish"}</button>
              <button style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${C.bdr}`, background: C.card, color: C.sub, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Edit draft</button>
              <button style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${C.bdr}`, background: C.card, color: C.red, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Dismiss</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState("pipeline");
  const [hasRun, setHasRun] = useState(false);
  const [running, setRunning] = useState(false);
  const [step, setStep] = useState(0);
  const [results, setResults] = useState(null);

  const run = () => { setRunning(true); setStep(1); const iv = setInterval(() => { setStep(s => { if (s >= 5) { clearInterval(iv); setRunning(false); setHasRun(true); setResults(runPipeline(TICKETS)); return 5; } return s + 1; }); }, 700); };

  const resolved = TICKETS.filter(t => t.status === "Resolved").length;
  const withDelta = TICKETS.filter(t => t.pipelineResult).length;

  return (
    <div style={{ fontFamily: "'Nunito Sans', system-ui, sans-serif", background: C.bg, minHeight: "100vh", padding: "20px 24px" }}>
      <div style={{ maxWidth: 960, margin: "0 auto" }}>
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: C.mu, textTransform: "uppercase", letterSpacing: "0.04em" }}>Resolution drafts prototype</div>
          <h1 style={{ fontSize: 22, fontWeight: 700, color: C.tx, margin: "4px 0" }}>Nightly batch pipeline simulation</h1>
          <div style={{ fontSize: 13, color: C.mu }}>{TICKETS.length} tickets, {resolved} resolved, 2 agents, {KB_ARTICLES.length} KB articles</div>
        </div>

        <div style={{ display: "flex", gap: 4, marginBottom: 16, borderBottom: `1px solid ${C.bdr}`, paddingBottom: 4 }}>
          {[["pipeline","Pipeline"],["tickets",`Tickets (${TICKETS.length})`],["articles",`KB Articles (${KB_ARTICLES.length})`],["agents","Agents (2)"]].map(([id,l]) => (
            <button key={id} onClick={() => setTab(id)} style={{ padding: "8px 16px", borderRadius: "6px 6px 0 0", border: "none", background: tab===id?C.card:"transparent", borderBottom: tab===id?`2px solid ${C.tx}`:"2px solid transparent", color: tab===id?C.tx:C.mu, fontSize: 13, fontWeight: tab===id?600:400, cursor: "pointer", fontFamily: "inherit" }}>{l}</button>
          ))}
        </div>

        {tab === "pipeline" && (
          <div>
            {!hasRun && !running && (
              <div style={{ textAlign: "center", padding: 40 }}>
                <div style={{ fontSize: 15, color: C.sub, marginBottom: 16 }}>Run the nightly batch to process {resolved} resolved tickets through the pipeline.</div>
                <button onClick={run} style={{ padding: "12px 32px", borderRadius: 8, border: "none", background: C.tx, color: "#fff", fontSize: 15, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Run nightly batch</button>
              </div>
            )}
            {(running || hasRun) && (
              <div style={{ marginBottom: 20 }}>
                {[
                  ["Collecting resolved tickets", `${resolved} resolved by human agents`, C.gray],
                  ["Retrieving linked KB articles", `${TICKETS.filter(t=>t.status==="Resolved"&&t.kbRef).length} with KB link, ${TICKETS.filter(t=>t.status==="Resolved"&&!t.kbRef).length} creation path`, C.purple],
                  ["Running LLM comparison", `${withDelta} deltas found, ${resolved - withDelta} no delta (1 is echo problem)`, C.teal],
                  ["Accumulating findings + conflict check", "Grouping by subject, checking agent agreement", C.amber],
                  ["Generating outputs", "Drafts, conflicts, creation proposals, stale alerts", C.green],
                ].map(([l,d,c], i) => (
                  <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 10, opacity: step > i ? 1 : step === i ? 0.6 : 0.25, transition: "opacity 0.4s" }}>
                    <div style={{ width: 22, height: 22, borderRadius: "50%", background: step>i?c+"20":C.grayBg, border: `1.5px solid ${step>i?c:C.bdr}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: step>i?c:C.mu, flexShrink: 0 }}>{step>i?"✓":i+1}</div>
                    <div><div style={{ fontSize: 14, fontWeight: 600, color: step>i?C.tx:C.mu }}>{l}</div><div style={{ fontSize: 12, color: C.mu }}>{d}</div></div>
                  </div>
                ))}
              </div>
            )}
            {hasRun && results && (
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 10, marginBottom: 16 }}>
                  {[
                    [results.outputs.filter(o=>o.outputType==="draft").length, "Correction drafts", C.teal],
                    [results.outputs.filter(o=>o.outputType==="conflict").length, "Conflict alerts", C.red],
                    [results.outputs.filter(o=>o.outputType==="creation_draft").length, "New article drafts", C.purple],
                    [results.outputs.filter(o=>o.outputType==="finding"||o.outputType==="creation_finding").length, "Below threshold", C.blue],
                    [results.stale.length, "Stale alerts", C.amber],
                  ].map(([n,l,c],i) => (
                    <div key={i} style={{ padding: 14, background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 8, textAlign: "center" }}>
                      <div style={{ fontSize: 26, fontWeight: 700, color: n>0?c:C.mu }}>{n}</div>
                      <div style={{ fontSize: 11, color: C.mu }}>{l}</div>
                    </div>
                  ))}
                </div>
                <div style={{ padding: "10px 14px", background: C.amberBg, borderLeft: `3px solid ${C.amber}`, marginBottom: 14 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: C.amber, marginBottom: 2 }}>BLIND SPOT: ECHO PROBLEM</div>
                  <div style={{ fontSize: 12, color: C.sub, lineHeight: 1.6 }}>WI-1220: Raj Patel repeated wrong $3,650 from KB. Pipeline saw zero delta. Error invisible without agent feedback channel.</div>
                </div>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.tx, marginBottom: 8 }}>Pipeline outputs</div>
                {results.outputs.map((o,i) => <Output key={i} o={o} />)}
                {results.stale.length > 0 && (
                  <div style={{ marginTop: 16 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.tx, marginBottom: 8 }}>Stale ticket alerts</div>
                    {results.stale.map(t => (
                      <div key={t.id} style={{ padding: 12, background: C.amberBg, borderLeft: `3px solid ${C.amber}`, marginBottom: 6 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={B(C.red)}>STALE</span><span style={{ fontSize: 13, fontWeight: 600, color: C.tx }}>{t.id}: {t.title}</span></div>
                        <div style={{ fontSize: 12, color: C.mu, marginTop: 4 }}>Open since {t.created}. No resolution. No KB article. Topic: {t.topic}.</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {tab === "tickets" && (
          <div>
            <div style={{ fontSize: 13, color: C.mu, marginBottom: 12 }}>Click any ticket to see the full conversation, AI attempt, agent resolution, and pipeline result.</div>
            {TICKETS.map(t => <Ticket key={t.id} t={t} />)}
          </div>
        )}

        {tab === "articles" && (
          <div>
            {KB_ARTICLES.map(a => (
              <div key={a.id} style={{ border: `1px solid ${C.bdr}`, borderRadius: 8, padding: 16, marginBottom: 10, background: C.card }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
                  <span style={B(C.blue)}>{a.id}</span>
                  <span style={{ fontSize: 14, fontWeight: 600, color: C.tx, flex: 1 }}>{a.title}</span>
                  <span style={{ fontSize: 12, color: C.mu }}>{a.category}</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: a.deflection<40?C.red:a.deflection<70?C.amber:C.green }}>{a.deflection}%</span>
                </div>
                <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.6, padding: 12, background: C.grayBg, borderRadius: 6, marginBottom: 8 }}>{a.content}</div>
                <div style={{ display: "flex", gap: 16, fontSize: 12, color: C.mu }}><span>Updated: {a.updated}</span><span>Views: {a.views}/mo</span></div>
                {(a.issues.wrong || a.issues.missing) && (
                  <div style={{ marginTop: 8, padding: 10, background: C.redBg, borderRadius: 6 }}>
                    <div style={{ fontSize: 10, fontWeight: 600, color: C.red, marginBottom: 4 }}>KNOWN ISSUES</div>
                    {a.issues.wrong && <div style={{ fontSize: 12, color: C.sub }}>Wrong: {a.issues.wrong}</div>}
                    {a.issues.missing && <div style={{ fontSize: 12, color: C.sub }}>Missing: {a.issues.missing}</div>}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {tab === "agents" && (
          <div style={{ display: "flex", gap: 16 }}>
            {Object.values(AGENTS).map(a => {
              const at = TICKETS.filter(t => t.agent === a.id);
              const wf = at.filter(t => t.pipelineResult);
              const echo = at.filter(t => t.status === "Resolved" && !t.pipelineResult && t.kbRef);
              return (
                <div key={a.id} style={{ flex: 1, border: `1px solid ${C.bdr}`, borderRadius: 8, padding: 20, background: C.card }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                    <div style={{ ...AV(a), width: 40, height: 40, fontSize: 14 }}>{a.initials}</div>
                    <div><div style={{ fontSize: 15, fontWeight: 700, color: C.tx }}>{a.name}</div><div style={{ fontSize: 12, color: C.mu }}>{a.role}</div></div>
                  </div>
                  <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.6, marginBottom: 12, padding: 10, background: C.grayBg, borderRadius: 6 }}>{a.behavior}</div>
                  <div style={{ fontSize: 12, color: C.mu, lineHeight: 1.8 }}>
                    <div><strong style={{ color: C.tx }}>{at.length}</strong> tickets handled</div>
                    <div><strong style={{ color: C.teal }}>{wf.length}</strong> produced findings</div>
                    <div><strong style={{ color: echo.length>0?C.amber:C.green }}>{echo.length}</strong> no delta {echo.length>0?"(includes echo risk)":"(correct articles)"}</div>
                  </div>
                  {echo.length > 0 && (
                    <div style={{ marginTop: 8, padding: 8, background: C.amberBg, borderRadius: 6, fontSize: 12, color: C.amber }}>
                      {echo.map(t => t.id).join(", ")} — response matched KB. If KB was wrong, agent echoed the error.
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
